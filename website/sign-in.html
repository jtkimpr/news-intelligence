<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PigeonBrief — 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f9f7f4;
      font-family: -apple-system, sans-serif;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .brand h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.8rem;
      color: #1a1a1a;
    }
    #clerk-sign-in { width: 100%; max-width: 420px; }
  </style>
</head>
<body>
  <div class="brand">
    <svg width="36" height="28" viewBox="0 0 96 76" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 66 44 C 52 36 26 22 8 8 C 16 8 34 18 48 30 C 36 20 22 12 16 6 C 32 2 56 14 62 32 Z" fill="#1a1a1a"/>
      <path d="M 66 44 C 74 40 84 32 84 22 C 84 12 76 8 70 14 C 66 20 66 36 66 44 Z" fill="#1a1a1a"/>
      <path d="M 66 44 C 56 54 44 60 38 56 C 46 50 56 46 66 44 Z" fill="#1a1a1a"/>
      <polygon points="84,20 96,24 84,28" fill="#1a1a1a"/>
      <circle cx="76" cy="16" r="3" fill="white"/>
    </svg>
    <h1>PigeonBrief</h1>
  </div>
  <div id="clerk-sign-in"></div>

  <script>
    const PUBLISHABLE_KEY = 'pk_test_YmVjb21pbmctc2FsbW9uLTYxLmNsZXJrLmFjY291bnRzLmRldiQ';
  </script>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YmVjb21pbmctc2FsbW9uLTYxLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://becoming-salmon-61.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    window.addEventListener('load', async () => {
      await window.Clerk.load();
      // 이미 로그인된 경우 메인으로 이동
      if (window.Clerk.user) {
        window.location.href = '/';
        return;
      }
      window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
        afterSignInUrl: '/',
        afterSignUpUrl: '/',
      });
    });
  </script>
</body>
</html>
