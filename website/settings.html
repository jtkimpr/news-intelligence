<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PigeonBrief — 내 설정</title>
  <link rel="stylesheet" href="assets/style.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    .settings-page { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
    .settings-page h2 { font-size: 1.1rem; font-weight: 600; margin: 32px 0 12px; color: #1a1a1a; border-bottom: 1px solid #e5e5e5; padding-bottom: 8px; }
    .section-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #f7f5f2; }
    .section-name { font-weight: 600; font-size: 0.95rem; }
    .section-desc { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .section-body { padding: 12px 16px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .tag { display: flex; align-items: center; gap: 4px; background: #f0ede8; border-radius: 20px; padding: 4px 10px; font-size: 0.8rem; }
    .tag button { background: none; border: none; cursor: pointer; color: #999; font-size: 0.9rem; line-height: 1; padding: 0; }
    .tag button:hover { color: #e53e3e; }
    .input-row { display: flex; gap: 8px; margin-top: 6px; }
    .input-row input { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; }
    .input-row button { padding: 7px 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .input-row button:hover { background: #333; }
    .sub-label { font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .btn-danger { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; }
    .btn-danger:hover { background: #fff5f5; }
    .add-section-form { background: #fff; border: 1px dashed #ccc; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .add-section-form input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem; margin-bottom: 8px; }
    .add-section-form button { padding: 8px 18px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .loading { text-align: center; padding: 60px; color: #999; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: #666; text-decoration: none; font-size: 0.85rem; margin-bottom: 20px; }
    .back-link:hover { color: #1a1a1a; }
    .divider { height: 1px; background: #f0ede8; margin: 12px 0; }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div class="brand">
        <svg class="brand-logo" width="46" height="36" viewBox="0 0 96 76" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 66 44 C 52 36 26 22 8 8 C 16 8 34 18 48 30 C 36 20 22 12 16 6 C 32 2 56 14 62 32 Z" fill="currentColor"/>
          <path d="M 66 44 C 74 40 84 32 84 22 C 84 12 76 8 70 14 C 66 20 66 36 66 44 Z" fill="currentColor"/>
          <path d="M 66 44 C 56 54 44 60 38 56 C 46 50 56 46 66 44 Z" fill="currentColor"/>
          <polygon points="84,20 96,24 84,28" fill="currentColor"/>
          <circle cx="76" cy="16" r="3" fill="white"/>
        </svg>
        <h1>PigeonBrief</h1>
      </div>
    </div>
  </header>

  <div class="settings-page">
    <a href="/" class="back-link">← 뉴스 보기</a>
    <div id="settings-root"><div class="loading">불러오는 중...</div></div>
  </div>

  <script>
    const API = 'https://api.pigeonbrief.com';
    let token = '';

    async function getToken() {
      return await window.Clerk.session.getToken();
    }

    async function api(method, path, body) {
      token = await getToken();
      const res = await fetch(API + path, {
        method,
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadSettings() {
      const data = await api('GET', '/api/settings');
      render(data.sections || []);
    }

    function render(sections) {
      const root = document.getElementById('settings-root');
      root.innerHTML = `
        <h2>내 섹션 관리</h2>
        <div class="add-section-form">
          <input id="new-section-name" placeholder="새 섹션 이름 (예: Agentic AI)" />
          <input id="new-section-desc" placeholder="설명 (선택)" style="margin-top:0" />
          <button onclick="addSection()">+ 섹션 추가</button>
        </div>
        ${sections.map(s => renderSection(s)).join('')}
        ${sections.length === 0 ? '<p style="color:#999;font-size:0.9rem">아직 섹션이 없어요. 위에서 추가해 주세요.</p>' : ''}
      `;
    }

    function renderSection(s) {
      const rssList = (s.rss_sources || []).map(r => `
        <span class="tag">${r.name} <button onclick="deleteRss(${r.id})" title="삭제">×</button></span>
      `).join('');
      const kwList = (s.keywords || []).map(k => `
        <span class="tag">${k.query} <button onclick="deleteKeyword(${k.id})" title="삭제">×</button></span>
      `).join('');

      return `
        <div class="section-card" id="section-${s.id}">
          <div class="section-header">
            <div>
              <div class="section-name">${s.name}</div>
              ${s.description ? `<div class="section-desc">${s.description}</div>` : ''}
            </div>
            <button class="btn-danger" onclick="deleteSection(${s.id})">삭제</button>
          </div>
          <div class="section-body">
            <div class="sub-label">RSS 소스</div>
            <div class="tag-list">${rssList || '<span style="color:#aaa;font-size:0.8rem">없음</span>'}</div>
            <div class="input-row">
              <input id="rss-url-${s.id}" placeholder="RSS URL" />
              <input id="rss-name-${s.id}" placeholder="이름" style="max-width:120px" />
              <button onclick="addRss(${s.id})">추가</button>
            </div>
            <div class="divider"></div>
            <div class="sub-label">키워드</div>
            <div class="tag-list">${kwList || '<span style="color:#aaa;font-size:0.8rem">없음</span>'}</div>
            <div class="input-row">
              <input id="kw-${s.id}" placeholder="검색 키워드 (예: AI agent enterprise)" />
              <button onclick="addKeyword(${s.id})">추가</button>
            </div>
          </div>
        </div>
      `;
    }

    async function addSection() {
      const name = document.getElementById('new-section-name').value.trim();
      const desc = document.getElementById('new-section-desc').value.trim();
      if (!name) return alert('섹션 이름을 입력해 주세요');
      await api('POST', '/api/settings/sections', { name, description: desc });
      loadSettings();
    }

    async function deleteSection(id) {
      if (!confirm('이 섹션과 관련 RSS/키워드가 모두 삭제돼요. 계속할까요?')) return;
      await api('DELETE', `/api/settings/sections/${id}`);
      loadSettings();
    }

    async function addRss(sectionId) {
      const url = document.getElementById(`rss-url-${sectionId}`).value.trim();
      const name = document.getElementById(`rss-name-${sectionId}`).value.trim();
      if (!url || !name) return alert('URL과 이름을 모두 입력해 주세요');
      await api('POST', '/api/settings/rss', { section_id: sectionId, url, name });
      loadSettings();
    }

    async function deleteRss(id) {
      await api('DELETE', `/api/settings/rss/${id}`);
      loadSettings();
    }

    async function addKeyword(sectionId) {
      const query = document.getElementById(`kw-${sectionId}`).value.trim();
      if (!query) return alert('키워드를 입력해 주세요');
      await api('POST', '/api/settings/keywords', { section_id: sectionId, query });
      loadSettings();
    }

    async function deleteKeyword(id) {
      await api('DELETE', `/api/settings/keywords/${id}`);
      loadSettings();
    }
  </script>

  <!-- Clerk -->
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_YmVjb21pbmctc2FsbW9uLTYxLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://becoming-salmon-61.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    window.addEventListener('load', async () => {
      await window.Clerk.load();
      if (!window.Clerk.user) {
        window.location.href = '/sign-in.html';
        return;
      }
      loadSettings();
    });
  </script>
</body>
</html>
