# 전역 설정
python_bin: /opt/homebrew/bin/python3.13

pipeline:
  max_age_hours: 24          # 이 시간 이내 기사만 수집
  max_articles_per_section: 20  # 섹션당 최종 카드 최대 수
  language_filter: [ko, en]  # 허용 언어

dedup:
  url_history_db: data/history.db
  title_similarity_threshold: 0.85  # 제목 유사도 기준

llm:
  model: qwen2.5:14b
  base_url: http://localhost:11434/v1
  max_input_tokens: 1000            # 기사 본문 truncate 기준
  min_relevance_score: 0.6          # 필터링 최소 관련성 점수

site:
  website_dir: website
  data_file: website/data/articles.json
  max_age_days: 7              # 카드뉴스 보관 기간 (일)

git:
  auto_push: true
  commit_message: "daily update: {date}"
